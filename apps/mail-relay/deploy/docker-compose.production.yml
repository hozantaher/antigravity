# Production deployment: anti-trace-relay + Tor sidecar
#
# Prerequisites:
#   - Run provision-server.sh first (generates keys, certs, env files)
#   - Build image: docker build -t anti-trace-relay:0.1.0 .
#
# Usage:
#   cd /opt/anti-trace-relay
#   docker compose -f docker-compose.production.yml up -d
#
# Architecture:
#   tor-sidecar (SOCKS5 :9050) <-- relay connects outbound through this
#   anti-trace-relay (:8090)   <-- accepts submissions (via Tor hidden service)
#   Isolated network: relay cannot reach internet directly

services:
  tor-sidecar:
    image: alpine:3
    command: >
      sh -c "
        apk add --no-cache tor &&
        echo 'SocksPort 0.0.0.0:9050' > /etc/tor/torrc &&
        echo 'SocksPolicy accept 172.0.0.0/8' >> /etc/tor/torrc &&
        echo 'SocksPolicy reject *' >> /etc/tor/torrc &&
        echo 'SafeSocks 1' >> /etc/tor/torrc &&
        echo 'Log notice stderr' >> /etc/tor/torrc &&
        tor -f /etc/tor/torrc
      "
    networks:
      relay-internal:
        ipv4_address: 172.28.0.10
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/lib/tor

  anti-trace-relay:
    image: anti-trace-relay:0.1.0
    ports:
      - "127.0.0.1:8090:8090"  # Only localhost (Tor hidden service forwards here)
    volumes:
      - ./data:/app/data
      - ./certs:/app/certs:ro
    env_file:
      - ./env
      - ./secrets
    environment:
      # Override: use tor-sidecar for outbound
      SOCKS_PROXY_ADDR: "172.28.0.10:9050"
      TRANSPORT_MODE: "tor"
      # Tor hidden service managed externally (via host torrc)
      TOR_ENABLED: "false"
    networks:
      relay-internal:
        ipv4_address: 172.28.0.20
    depends_on:
      - tor-sidecar
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

networks:
  relay-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
    internal: true  # No external access -- all outbound goes through Tor sidecar
