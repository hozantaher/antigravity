packages:
  - 'spine/**'
  - 'apps/**'
  - 'frontiers/**'

onlyBuiltDependencies:
  - '@firebase/util'
  - '@sentry/cli'
  - better-sqlite3
  - cpu-features
  - esbuild
  - msgpackr-extract
  - msw
  - protobufjs
  - ssh2
allowBuilds:
  '@firebase/util': true
  '@parcel/watcher': true
  '@sentry/cli': true
  better-sqlite3: true
  cpu-features: true
  esbuild: true
  msgpackr-extract: true
  msw: true
  protobufjs: true
  ssh2: true
  unrs-resolver: true
