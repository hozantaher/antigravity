openapi: 3.1.0
info:
  title: Mailboxes Domain API
  version: 0.1.0
  description: |
    Mailbox lifecycle — CRUD, selector, health, warmup, backpressure.
    Source-of-truth: `outreach_mailboxes` PostgreSQL table.
    All endpoints served by outreach-dashboard BFF (Express) proxying to
    machinery-outreach (Go).

servers:
  - url: http://localhost:3001
    description: Local BFF
  - url: https://outreach-dashboard-production-*.up.railway.app
    description: Prod dashboard (when React deploy replaces Nuxt)

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Mailbox:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        display_name: { type: string }
        host: { type: string }
        port: { type: integer }
        smtp_username: { type: string }
        imap_host: { type: string }
        imap_port: { type: integer }
        imap_username: { type: string }
        daily_limit: { type: integer }
        status:
          type: string
          enum: [active, warming, paused, bounce_hold, retired]
        status_reason: { type: string, nullable: true }
        total_sent: { type: string }
        total_bounced: { type: string }
        consecutive_bounces: { type: integer }
        last_send_at: { type: string, format: date-time, nullable: true }
        proxy_url: { type: string, nullable: true }
        tz: { type: string }
        has_valid_password:
          type: boolean
          description: |
            Derived server-side via isPlaceholderPassword(). TRUE when DB
            password is NOT NULL, length ≥ 10, and does not match placeholder
            patterns (123p*, xxxx*, repeated trigrams). Dashboard uses this
            to render "HESLO" badge on mailbox cards. See SEND-S6.2.
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }

security:
  - ApiKeyAuth: []

paths:
  /api/mailboxes:
    get:
      summary: List all mailboxes (sanitized — no password field)
      parameters:
        - in: query
          name: q
          schema: { type: string, maxLength: 200 }
          description: Server-side ILIKE filter on from_address + display_name
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Mailbox' }
        '500':
          description: pg error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    post:
      summary: Create mailbox (password required)
      responses:
        '200':
          description: Created row (still no password in response)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Mailbox' }

  /api/mailboxes/{id}:
    patch:
      summary: Update mailbox (empty password = no change)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Updated row }
    delete:
      summary: Delete mailbox
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Deleted }

  /api/mailboxes/{id}/stats:
    get:
      summary: Send stats per mailbox (30d + lifetime)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Stats payload }

  /api/mailboxes/{id}/full-check:
    get:
      summary: Full health check — SMTP + IMAP + proxy + anti-trace + config + warmup + bounce + send-rate + pipeline
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: force
          schema: { type: integer, enum: [0, 1] }
          description: "1 = bypass 60s cache"
      responses:
        '200': { description: Composite health result }
        '404': { description: Mailbox not found }

  /api/mailboxes/health-summary:
    get:
      summary: Aggregate health across all mailboxes
      responses:
        '200': { description: Counts per status + recent failures }

  /api/mailboxes/{id}/warmup/start:
    post:
      summary: Begin warmup from day 1
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Warmup schedule row }

  /api/mailboxes/bulk-check:
    post:
      summary: Queue bulk health check across all mailboxes (async job)
      responses:
        '200':
          description: Job enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string }

# Events — published to msgbus, consumed by campaigns/intelligence/dashboard
# (documented here for contract; actual transport = in-process msgbus today)
x-events:
  - name: mailbox.health.changed
    description: status transition (active↔warming↔paused↔bounce_hold)
  - name: mailbox.circuit.opened
    description: 5 SMTP failures in 15min — breaker tripped
  - name: mailbox.auth_fail_alert
    description: "SEND-S6.3 — 3 SMTP AUTH fails in 15min; alerts via slog + webhook + dashboard banner"
