[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Use the Dockerfile ENTRYPOINT (entrypoint.sh) so wireproxy starts before
# the relay when WIREPROXY_CONFIG is set. Hardcoding startCommand to the
# binary path would bypass the entrypoint and skip wireproxy boot.
startCommand = "/app/entrypoint.sh"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

