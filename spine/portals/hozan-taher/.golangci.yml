run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: outreach,privacy-gateway,anti-trace-relay

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters: [errcheck, unparam]
  max-issues-per-linter: 50
  max-same-issues: 10
