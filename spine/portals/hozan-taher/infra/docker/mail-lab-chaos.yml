# Mail Lab — toxiproxy chaos overlay (ML3.4).
#
# Layers on top of mail-lab.yml. Use with:
#
#   docker compose -f infra/docker/mail-lab.yml \
#                  -f infra/docker/mail-lab-chaos.yml up -d
#
# Adds a single toxiproxy instance that can sit in front of every
# provider's SMTP/IMAP ports. Toxics (latency, bandwidth, slow_close,
# random reset) are configured at runtime via scripts/mail-lab/chaos.sh
# — this file only ships the container + the upstream proxies.
#
# Why overlay vs. baked into mail-lab.yml:
# - Production-shape lab boots clean (no chaos). Operators opt-in.
# - Toxiproxy adds latency to every connection even at zero-toxic; the
#   default state should be "no chaos" for fast iteration.
# - When multi-provider (ML2.1) merges, this overlay scales by adding
#   more upstreams to the toxiproxy config — base mail-lab.yml stays
#   untouched.

services:
  mail-lab-toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    container_name: mail-lab-toxiproxy
    networks:
      - mail-lab
    ports:
      # Toxiproxy admin API — operator hits this from host
      - "28474:8474"
      # Proxied lab ports (vs. base mail-lab.yml which exposes the
      # provider's real ports directly). Tests using toxiproxy connect
      # to these ports; tests that bypass chaos use the base ports.
      - "29025:29025" # SMTP plain (proxy to mail-lab-seznam:25)
      - "29465:29465" # SMTPS (proxy to mail-lab-seznam:465)
      - "29587:29587" # SMTP submission (proxy to mail-lab-seznam:587)
      - "29993:29993" # IMAPS (proxy to mail-lab-seznam:993)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8474/version || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      mail-lab-seznam:
        condition: service_started

  # Sidecar that pre-registers the upstreams once toxiproxy is up.
  # Without this, operators have to POST proxy definitions manually
  # before any chaos.sh command works.
  mail-lab-toxiproxy-bootstrap:
    image: curlimages/curl:8.5.0
    container_name: mail-lab-toxiproxy-bootstrap
    networks:
      - mail-lab
    depends_on:
      mail-lab-toxiproxy:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        set -e
        TP=http://mail-lab-toxiproxy:8474
        # Idempotent registration: PUT (create-or-replace) one proxy per port.
        for tuple in \
          'seznam-smtp:29025:mail-lab-seznam:25' \
          'seznam-smtps:29465:mail-lab-seznam:465' \
          'seznam-submission:29587:mail-lab-seznam:587' \
          'seznam-imaps:29993:mail-lab-seznam:993'; do
          name=$$(echo $$tuple | cut -d: -f1)
          listen_port=$$(echo $$tuple | cut -d: -f2)
          upstream_host=$$(echo $$tuple | cut -d: -f3)
          upstream_port=$$(echo $$tuple | cut -d: -f4)
          curl -fsS -X POST -H 'Content-Type: application/json' "$$TP/proxies" \
            -d "{\"name\":\"$$name\",\"listen\":\"0.0.0.0:$$listen_port\",\"upstream\":\"$$upstream_host:$$upstream_port\",\"enabled\":true}" \
            || curl -fsS -X POST -H 'Content-Type: application/json' "$$TP/proxies/$$name" \
              -d "{\"listen\":\"0.0.0.0:$$listen_port\",\"upstream\":\"$$upstream_host:$$upstream_port\",\"enabled\":true}"
          echo "registered $$name -> $$upstream_host:$$upstream_port"
        done
        echo "toxiproxy bootstrap complete"
