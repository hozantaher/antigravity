# Full stack: 5 services + redis
# Usage: docker compose -f infra/docker/docker-compose.yml up --build
#
# Before starting:
#   export DATA_KEY=$(head -c 32 /dev/urandom | base64)
#   export VAULT_KEY=$(head -c 32 /dev/urandom | base64)
#   export API_TOKEN=$(head -c 24 /dev/urandom | base64)

services:
  privacy-gateway:
    build: ../../services/privacy-gateway
    ports:
      - "8080:8080"
    volumes:
      - pg-data:/app/data
    environment:
      LISTEN_ADDR: ":8080"
      ALIAS_DOMAIN: "relay.local"
      DATA_DIR: "/app/data"
      DELIVERY_MODE: "record-only"
      DEV_API_TOKEN: "${API_TOKEN:-dev-token}"
      DEV_USER_ID: "operator"
      DEV_TENANT_ID: "tenant-1"
      DEV_USER_EMAIL: "operator@relay.local"
      INTAKE_API_TOKEN: "${INTAKE_TOKEN:-intake-token}"
      INTAKE_USER_ID: "intake-user"
      INTAKE_TENANT_ID: "tenant-1"
      INTAKE_USER_EMAIL: "intake@relay.local"

  anti-trace-relay:
    build: ../../services/anti-trace-relay
    ports:
      - "8090:8090"
    volumes:
      - atr-data:/app/data
      - ./certs:/app/certs:ro
    environment:
      LISTEN_ADDR: ":8090"
      DATA_DIR: "/app/data"
      DATA_ENCRYPTION_KEY_B64: "${DATA_KEY}"
      VAULT_ENCRYPTION_KEY_B64: "${VAULT_KEY}"
      DEV_API_TOKEN: "${API_TOKEN:-dev-token}"
      DEV_USER_ID: "submitter"
      DEV_TENANT_ID: "tenant-1"
      TLS_CERT_FILE: "/app/certs/cert.pem"
      TLS_KEY_FILE: "/app/certs/key.pem"
      DELIVERY_MODE: "bridge"
      TRANSPORT_MODE: "direct"
      BRIDGE_GATEWAY_URL: "http://privacy-gateway:8080"
      BRIDGE_GATEWAY_TOKEN: "${INTAKE_TOKEN:-intake-token}"
      RELAY_MIN_DELAY_SECONDS: "5"
      RELAY_MAX_DELAY_SECONDS: "30"
      BATCH_INTERVAL_SECONDS: "10"

  # ── MCP Server ──
  mcp:
    build:
      context: ../../features/platform/mcp
      dockerfile: Dockerfile
      target: mcp
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      TYPESENSE_URL: "${TYPESENSE_URL:-}"
      TYPESENSE_API_KEY: "${TYPESENSE_API_KEY:-}"
      LOKI_URL: "${LOKI_URL:-}"
      MCP_PORT: "3002"
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: "production"
    depends_on:
      - redis

  # ── Worker (PDF generation) ──
  worker:
    build:
      context: ../../features/platform/worker
      dockerfile: Dockerfile
    environment:
      REDIS_URL: "redis://redis:6379"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      MCP_REMOTE_URL: "http://mcp:3002"
      MCP_REMOTE_SECRET: "${MCP_SECRET:-}"
      FIREBASE_SERVICE_ACCOUNT_JSON: "${FIREBASE_SERVICE_ACCOUNT_JSON:-}"
      FIREBASE_STORAGE_BUCKET: "${FIREBASE_STORAGE_BUCKET:-}"
      SENDGRID_API_KEY: "${SENDGRID_API_KEY:-}"
      NODE_ENV: "production"
    depends_on:
      - redis
      - mcp

  # ── Redis (queue + OAuth state) ──
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Local Test Mailbox — two services ──
  #
  # Mailpit  → catches ALL outgoing SMTP (port 1025)
  #            beautiful web GUI at http://localhost:8025
  #            (Mailpit does NOT support IMAP)
  #
  # GreenMail → IMAP inbox for outreach@test.local (port 1143)
  #             Accepts replies sent to port 2025
  #             Used by the IMAP poller in modules/outreach
  #
  # Dev flow:
  #   Send outgoing email → Mailpit (view at :8025)
  #   Simulate reply     → send to GreenMail SMTP :2025
  #   IMAP poller        → reads from GreenMail IMAP :1143

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # Web UI  →  http://localhost:8025
      - "1025:1025"   # SMTP (outgoing catch-all)
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
      MP_DATABASE: "/data/mailpit.db"
    volumes:
      - mailpit-data:/data

  greenmail:
    image: greenmail/standalone:2.1.2
    ports:
      - "2025:3025"   # SMTP (send replies here to simulate inbound)
      - "1144:3143"   # IMAP (poller connects here)
    environment:
      GREENMAIL_OPTS: >-
        -Dgreenmail.setup.test.all
        -Dgreenmail.hostname=0.0.0.0
        -Dgreenmail.users=outreach:outreach@test.local
        -Dgreenmail.auth.disabled=true

  # ── Outreach PostgreSQL (dev only) ──
  outreach-db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: outreach
      POSTGRES_USER: outreach
      POSTGRES_PASSWORD: outreach
    volumes:
      - outreach-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outreach -d outreach"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── Firmy.cz PostgreSQL (dev only — mirrors Railway firmy DB) ──
  firmy-db:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: firmy
      POSTGRES_USER: firmy
      POSTGRES_PASSWORD: firmy
    volumes:
      - firmy-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firmy -d firmy"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── parsedmarc (DMARC aggregate report analyzer) ──
  #
  # Polls an IMAP inbox for DMARC RUA reports (XML-in-zip) sent by receivers
  # like Google/Yahoo/Outlook, parses them, and writes structured JSON to
  # ./parsedmarc-output. Optional OpenSearch/Kibana can be added later for
  # dashboarding — for now, JSON files are enough to spot alignment failures.
  #
  # Setup (one-time, before starting this service):
  #   1. Publish in DNS:
  #        _dmarc.<sending-domain>  TXT  "v=DMARC1; p=none; rua=mailto:dmarc-reports@<yourdomain>; ruf=mailto:dmarc-forensic@<yourdomain>; fo=1; adkim=s; aspf=s"
  #   2. Create IMAP account dmarc-reports@<yourdomain> that ONLY receives RUA.
  #   3. Copy modules/outreach/configs/parsedmarc.ini.example to
  #      modules/outreach/configs/parsedmarc.ini, fill in IMAP creds.
  #   4. Start:  docker compose up parsedmarc
  #
  # Output: JSON files in ./parsedmarc-output — tail aggregate.json to watch
  # which receivers are seeing SPF/DKIM alignment failures on your traffic.
  # Forensic (RUF) reports (rarer) land in forensic.json.
  parsedmarc:
    image: domainaware/parsedmarc:latest
    restart: unless-stopped
    volumes:
      - ../../modules/outreach/configs/parsedmarc.ini:/etc/parsedmarc.ini:ro
      - ./parsedmarc-output:/output
    command: ["parsedmarc", "-c", "/etc/parsedmarc.ini"]
    # Never exposes a port — this is a pull-model consumer of your RUA inbox.

volumes:
  pg-data:
  atr-data:
  redis-data:
  outreach-db-data:
  firmy-db-data:
  mailpit-data:
