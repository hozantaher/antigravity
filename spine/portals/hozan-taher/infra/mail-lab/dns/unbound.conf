# Mail Lab — unbound DNS resolver for *.lab zones (ML1.2).
#
# Forwarding to upstream resolvers is intentionally disabled — Mail Lab is
# sealed (no egress). Queries for non-lab domains return SERVFAIL by design.
# This catches "did orchestrator accidentally reach for real Seznam?" bugs
# at the resolver layer.

server:
  verbosity: 1
  interface: 0.0.0.0
  port: 53
  do-ip4: yes
  do-ip6: no
  do-udp: yes
  do-tcp: yes

  # Allow lookups from our docker subnet only.
  access-control: 127.0.0.0/8 allow
  access-control: 10.20.0.0/24 allow
  # Default deny everything else (covers the host bridge from outside).
  access-control: 0.0.0.0/0 refuse

  # No upstream — sealed environment.
  do-not-query-localhost: no
  harden-glue: yes
  harden-dnssec-stripped: no
  use-syslog: no
  log-queries: no
  log-replies: no

  # ── seznam.lab zone ────────────────────────────────────────────────────
  local-zone: "seznam.lab." static
  local-data: "seznam.lab.            IN A     10.20.0.10"
  local-data: "seznam.lab.            IN MX    10 mx.seznam.lab."
  local-data: "seznam.lab.            IN TXT   \"v=spf1 mx ~all\""
  local-data: "mx.seznam.lab.         IN A     10.20.0.10"
  local-data: "imap.seznam.lab.       IN A     10.20.0.10"
  local-data: "webmail.seznam.lab.    IN A     10.20.0.20"
  # DKIM TXT placeholder — ML1.4 replaces this with real public key.
  local-data: "mail._domainkey.seznam.lab. IN TXT \"v=DKIM1; k=rsa; \""
  # Reverse PTR
  local-data-ptr: "10.20.0.10  mx.seznam.lab"

  # ── gmail.lab zone (ML2 — placeholder so DNS is ready) ────────────────
  local-zone: "gmail.lab." static
  local-data: "gmail.lab.             IN A     10.20.0.11"
  local-data: "gmail.lab.             IN MX    10 mx.gmail.lab."
  local-data: "gmail.lab.             IN TXT   \"v=spf1 mx ~all\""
  local-data: "mx.gmail.lab.          IN A     10.20.0.11"
  local-data: "imap.gmail.lab.        IN A     10.20.0.11"
  local-data: "webmail.gmail.lab.     IN A     10.20.0.21"
  local-data: "mail._domainkey.gmail.lab. IN TXT \"v=DKIM1; k=rsa; \""
  local-data-ptr: "10.20.0.11  mx.gmail.lab"

  # ── outlook.lab zone (ML2 — placeholder) ──────────────────────────────
  local-zone: "outlook.lab." static
  local-data: "outlook.lab.           IN A     10.20.0.12"
  local-data: "outlook.lab.           IN MX    10 mx.outlook.lab."
  local-data: "outlook.lab.           IN TXT   \"v=spf1 mx ~all\""
  local-data: "mx.outlook.lab.        IN A     10.20.0.12"
  local-data: "imap.outlook.lab.      IN A     10.20.0.12"
  local-data: "webmail.outlook.lab.   IN A     10.20.0.22"
  local-data: "mail._domainkey.outlook.lab. IN TXT \"v=DKIM1; k=rsa; \""
  local-data-ptr: "10.20.0.12  mx.outlook.lab"

  # ── lab itself (so reverse + apex queries don't crash) ───────────────
  local-zone: "lab." static
