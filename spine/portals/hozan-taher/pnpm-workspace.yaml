packages:
  - 'features/platform/outreach-dashboard'
  - 'features/platform/dashboard-core'
  - 'features/platform/mcp'
  - 'features/platform/worker'
  - 'features/acquisition/scrapers'

overrides:
  axios: '>=1.15.2'
  protobufjs: '>=7.5.5'

# pnpm v10 blocks dependency build scripts by default and (on the Firebase
# App Hosting builder) hard-errors with ERR_PNPM_IGNORED_BUILDS unless each
# is explicitly approved here. This is the list the builder reported.
onlyBuiltDependencies:
  - '@firebase/util'
  - '@sentry/cli'
  - better-sqlite3
  - cpu-features
  - esbuild
  - msgpackr-extract
  - msw
  - protobufjs
  - ssh2
