name: Test failure (auto)
description: Auto-vytvořeno z .github/workflows/triage-failures.yml. Ručně typicky nepoužívat.
title: "[test-fail] "
labels: ["kind/test", "from/test-fail"]
body:
  - type: markdown
    attributes:
      value: |
        Tento template plní triage-failures workflow. Pole vychází z junit/vitest JSON výstupu.
  - type: input
    id: test_name
    attributes:
      label: Test name
      placeholder: "TestDaemonAlertWebhook"
    validations:
      required: true
  - type: input
    id: file_path
    attributes:
      label: File
      placeholder: "features/outreach/mailboxes/watchdog/daemon_test.go"
    validations:
      required: true
  - type: textarea
    id: failure_message
    attributes:
      label: Failure message
      render: shell
    validations:
      required: true
  - type: input
    id: ci_run_url
    attributes:
      label: CI run URL
      placeholder: "https://github.com/messingdev/hozan-taher/actions/runs/..."
  - type: input
    id: failure_count_7d
    attributes:
      label: Failure count (last 7 days)
      placeholder: "1 = first; 3+ = likely flake"
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance
      value: |
        - [ ] Test prochází 20× v řadě (`go test -count=20 -race ./...`)
        - [ ] Root cause v PR description
    validations:
      required: true
