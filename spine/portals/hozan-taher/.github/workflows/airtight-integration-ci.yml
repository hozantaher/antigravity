name: Airtight Integration — LAB_ONLY=1 zero-SMTP + AP1 warmup cap

# AT3.2 — runtime proof that Engine.Run with LAB_ONLY=1 makes ZERO real
# SMTP / HTTP relay egress. The LabAbortEvaluator gate (engine.go G8) must
# intercept every send before AntiTraceClient.Send fires.
#
# AP1.B — runtime proof that the DB trigger trg_enforce_warmup_cap (migration
# 071) and the status guard (migration 079) reject send_events INSERTs when
# the warmup cap is exhausted or the mailbox is inactive. Tests live in
# features/outreach/campaigns/sender/ with build tag `integration`.
#
# Triggers on PRs touching the sender engine or relay intake layer because
# either side could silently break the airtight guarantee:
#   - sender/ changes: could bypass the LabAbortEvaluator gate
#   - relay/ changes: could change how the relay client is constructed
#
# This check is REQUIRED (branch protection enforced via merge-gate.yml).
# ADR: docs/decisions/ADR-005-airtight-dev-env.md §D5
# Subsystem map SHA: 45ecf7d991fef50371d5636ec5bc1e1787a4fbff
# Closes: #292 (AT3.2)

on:
  pull_request:
    paths:
      - 'features/outreach/campaigns/sender/**'
      - 'features/outreach/campaigns/integration/**'
      - 'features/outreach/relay/**'
      - 'features/platform/common/metrics/**'
      - 'scripts/migrations/071_*.sql'
      - 'scripts/migrations/079_*.sql'
      - 'scripts/migrations/080_*.sql'
      - '.github/workflows/airtight-integration-ci.yml'

jobs:
  airtight-integration:
    name: airtight-lab-only-integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: features/outreach/campaigns/go.mod
          cache-dependency-path: features/outreach/campaigns/go.sum

      - name: Restore Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-airtight-${{ hashFiles('features/outreach/campaigns/go.sum', 'features/platform/common/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-airtight-
            ${{ runner.os }}-go-build-

      - name: Build campaigns service
        run: go build ./features/outreach/campaigns/...

      - name: Run AT3.2 airtight integration tests
        run: go test -tags=integration -race -count=1 -v ./features/outreach/campaigns/integration/...
        timeout-minutes: 5

      - name: Run AP1 warmup cap DB trigger integration tests (sender package)
        run: |
          go test -tags=integration -count=1 -race -timeout=300s \
            -v ./features/outreach/campaigns/sender/...
        timeout-minutes: 6
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/test?sslmode=disable
