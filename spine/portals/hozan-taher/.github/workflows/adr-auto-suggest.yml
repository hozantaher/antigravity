name: ADR auto-suggest

# North-star aspirace #8: ADR auto-generation pre-merge hook scans diff
# for architectural patterns and comments on the PR with a fill-in
# template snippet.
#
# Trigger: every PR open / sync against main.
#
# Behaviour:
#   - Run scripts/audit/adr-suggest.sh against the PR diff.
#   - If the script exits 10 (pattern detected), upsert a single PR comment
#     with the rendered ADR-template snippet. The comment is identifiable by
#     its leading marker so subsequent runs replace rather than spam.
#   - If the script exits 0, no comment is posted (idempotent no-op).
#
# Heuristic-only: never blocks merge. Authors can ignore or reply
# `/skip-adr <reason>`. See docs/playbooks/adr-auto-suggest.md.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: adr-auto-suggest-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  suggest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run ADR suggest
        id: suggest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set +e
          payload=$(bash scripts/audit/adr-suggest.sh --range "${BASE_SHA}...HEAD")
          rc=$?
          set -e
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # Persist payload to file (avoids GH_OUTPUT multiline quoting issues).
          if [ "$rc" -eq 10 ]; then
            printf '%s\n' "$payload" > /tmp/adr-suggest-comment.md
            echo "comment_path=/tmp/adr-suggest-comment.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Upsert PR comment
        if: steps.suggest.outputs.rc == '10'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          COMMENT_PATH: ${{ steps.suggest.outputs.comment_path }}
        run: |
          set -euo pipefail
          marker="<!-- adr-auto-suggest:v1 -->"
          # Prepend hidden marker so we can find prior comments.
          {
            echo "$marker"
            cat "$COMMENT_PATH"
          } > /tmp/adr-comment-final.md

          existing_id=$(gh api \
            "repos/${REPO}/issues/${PR_NUMBER}/comments?per_page=100" \
            --jq ".[] | select(.body | startswith(\"${marker}\")) | .id" \
            | head -n1 || true)

          if [ -n "$existing_id" ]; then
            gh api -X PATCH \
              "repos/${REPO}/issues/comments/${existing_id}" \
              -f body="$(cat /tmp/adr-comment-final.md)"
            echo "updated comment ${existing_id}"
          else
            gh pr comment "$PR_NUMBER" --body-file /tmp/adr-comment-final.md
            echo "posted new comment"
          fi

      - name: No-op summary
        if: steps.suggest.outputs.rc != '10'
        run: |
          echo "no architectural pattern detected — no ADR suggestion posted"
