name: Mutation Testing (Stryker)

# Weekly cron only — mutation testing is too slow for per-PR gating and
# the signal is most useful as a trend over time. Manual dispatch is
# kept for ad-hoc runs (e.g. after a big test refactor).
#
# Tracker: KT-B9 (initiative
# docs/initiatives/2026-04-30-kampan-vykupu-techniky-B-quality.md).
# Playbook: docs/playbooks/mutation-testing.md
on:
  schedule:
    # Weekly — Monday 04:00 UTC. Picks up commits merged over the
    # weekend without competing with the Sunday adversarial sweep.
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  outreach-dashboard:
    name: outreach-dashboard src/lib
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: features/platform/outreach-dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v6
        with: { node-version: '20', cache: 'pnpm' }
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Run Stryker
        run: pnpm test:mutation

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: features/platform/outreach-dashboard/reports/mutation/
          retention-days: 30
