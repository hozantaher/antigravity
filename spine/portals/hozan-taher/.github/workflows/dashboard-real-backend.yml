name: Dashboard Real-Backend Smoke

on:
  push:
    branches: [main, 'wm/development', 'wm/tests']
    paths:
      - 'features/platform/outreach-dashboard/**'
      - 'scripts/migrations/**'
      - 'features/inbound/orchestrator/internal/schema/**'
      - '.github/workflows/dashboard-real-backend.yml'
  pull_request:
    paths:
      - 'features/platform/outreach-dashboard/server.js'
      - 'features/platform/outreach-dashboard/src/**'
      - 'features/platform/outreach-dashboard/schema-manifest.json'
      - 'features/platform/outreach-dashboard/tests/integration/**'
      - 'features/platform/outreach-dashboard/tests/e2e/a11y.spec.ts'
      - 'features/platform/outreach-dashboard/playwright.config.js'
      - 'scripts/migrations/**'
      - 'features/inbound/orchestrator/internal/schema/**'
      - '.github/workflows/dashboard-real-backend.yml'

jobs:
  real-backend-smoke:
    name: Real-backend smoke (testcontainers)
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
        options: --privileged
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration suite (with Docker for testcontainers)
        run: cd features/platform/outreach-dashboard && pnpm test:integration
        env:
          # testcontainers env: ensure Docker daemon detected on GHA
          TESTCONTAINERS_HOST_OVERRIDE: localhost
          TESTCONTAINERS_RYUK_DISABLED: 'true'

      - name: Run schema-drift regression suite
        run: cd features/platform/outreach-dashboard && pnpm vitest run tests/regression/schema-drift.test.ts

  schema-parity:
    name: Schema parity (Go endpoint round-trip)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run Go schema package tests
        run: go test -race ./features/inbound/orchestrator/internal/schema/...

  a11y-gate:
    name: Accessibility gate (axe-core, blocks on critical)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: cd features/platform/outreach-dashboard && pnpm exec playwright install --with-deps chromium

      - name: Run axe-core a11y gate
        run: cd features/platform/outreach-dashboard && pnpm exec playwright test tests/e2e/a11y.spec.ts --reporter=list

      - name: Upload a11y summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-summary
          path: features/platform/outreach-dashboard/reports/a11y/summary.json
          if-no-files-found: ignore

  flaky-quarantine:
    name: Flaky-test auto-quarantine update
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only on main; PRs use the regular test job
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run vitest with JSON reporter
        id: vitest
        run: |
          cd features/platform/outreach-dashboard
          pnpm vitest run --reporter=json --outputFile=/tmp/vitest-result.json || true

      - name: Update flaky quarantine list
        id: flaky
        run: |
          cd features/platform/outreach-dashboard
          node scripts/flaky-ci-update.mjs --run-log=/tmp/vitest-result.json || true
        continue-on-error: true

      - name: Commit flaky_quarantine.json updates (if changed)
        if: steps.flaky.outputs.newly_quarantined != '0' || steps.flaky.outputs.newly_restored != '0'
        run: |
          cd features/platform/outreach-dashboard
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add flaky_quarantine.json flaky-history.json
          git commit -m "chore(flaky): auto-quarantine update — newly_q=${{ steps.flaky.outputs.newly_quarantined }} restored=${{ steps.flaky.outputs.newly_restored }}"
          git push
