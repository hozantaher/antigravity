name: Mail Lab CI

# ═══════════════════════════════════════════════════════════════════════
# TRIGGER CONDITIONS
#   push/PR on branches touching mail-lab infra, mail-lab-api service,
#   maillabclient, orchestrator labhook, boot scripts, or this file.
#   Schedule (Monday 06:00 UTC) catches docker-mailserver image drift even
#   when nothing in this repo changed.
#   workflow_dispatch for manual runs (e.g. debugging a stack issue).
#
# REQUIRED SECRETS
#   None — this workflow uses only public images + in-repo code.
#   LAB_API_KEY defaults to "dev-only" (same as local dev).
#
# COMMON FAILURE MODES + FIXES
#   1. "Boot mail-lab stack" times out (exit 124)
#      → docker-mailserver startup is slow; timeout-minutes=12 covers it.
#        If the runner is overloaded, re-run; if consistent, increase.
#   2. "/healthz never returned 200" after compose up
#      → mail-lab-api binary was built but failed to start.
#        Check "Start mail-lab-api binary" step output + compose logs
#        captured by "Capture compose logs" on failure.
#   3. Unit tests fail in mail-lab-api or labhook
#      → Pure Go tests, no Docker required. Run locally:
#            go test -race ./features/platform/mail-lab-api/...
#            go test -race ./features/inbound/orchestrator/labhook/...
#            go test -race ./features/platform/common/maillabclient/...
#   4. Smoke curl: connection refused on localhost:8090
#      → API binary not started. up.sh is called with --no-api so CI
#        starts the binary in a separate step after compose is healthy.
#        Confirm the "Start mail-lab-api binary" step ran and check its log.
#   5. "evaluate reject verdict" grep fails
#      → Profile logic changed. Check gmail.json max_message_size_bytes.
#
# HOW TO RUN LOCALLY
#   # Option A — use the boot script (same as CI path):
#   bash scripts/mail-lab/up.sh --no-seed --no-api
#   cd features/platform/mail-lab-api
#   go run ./cmd/mail-lab-api/ &
#   curl -sf http://localhost:8090/healthz
#   bash scripts/mail-lab/down.sh --clean
#
#   # Option B — act (GitHub Actions runner locally):
#   act -j smoke --secret LAB_API_KEY=dev-only
#
# SUBSYSTEM: mail-lab (features/platform/mail-lab-api, infra/docker/mail-lab.yml)
# ADR: docs/decisions/ADR-005-airtight-dev-env.md
# ═══════════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main, 'wm/development', 'wm/tests']
    paths:
      - 'infra/docker/mail-lab.yml'
      - 'infra/docker/mail-lab/**'
      - 'features/platform/mail-lab-api/**'
      - 'features/platform/common/maillabclient/**'
      - 'features/inbound/orchestrator/labhook/**'
      - 'scripts/mail-lab/**'
      - '.github/workflows/mail-lab-ci.yml'
  pull_request:
    paths:
      - 'infra/docker/mail-lab.yml'
      - 'infra/docker/mail-lab/**'
      - 'features/platform/mail-lab-api/**'
      - 'features/platform/common/maillabclient/**'
      - 'features/inbound/orchestrator/labhook/**'
      - 'scripts/mail-lab/**'
      - '.github/workflows/mail-lab-ci.yml'
  schedule:
    # Every Monday 06:00 UTC — catches docker-mailserver image drift.
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      keep_running:
        description: 'Leave the stack up after tests (debugging)'
        required: false
        default: 'false'
        type: boolean

# Cancel superseded runs on the same branch/PR to save runner minutes.
concurrency:
  group: mail-lab-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: mail-lab smoke
    runs-on: ubuntu-latest
    # 12 min covers docker-mailserver startup (~5 min) + tests + teardown.
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      # ── Go toolchain ──────────────────────────────────────────────────
      # Use the go.work workspace at the repo root so all modules (mail-lab-api,
      # common, orchestrator) resolve together without individual go.sum files.
      # go-version-file points at the workspace root directive; setup-go reads
      # the go directive from go.work when the file contains "go X.Y".
      # FIX: previously pointed at features/platform/mail-lab-api/go.mod (correct) but
      # listed features/platform/mail-lab-api/go.sum (does not exist — no external deps
      # beyond the workspace, so no go.sum is generated). Using go.work avoids
      # the missing-go.sum warning and caches all modules in one key.
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: features/platform/mail-lab-api/go.mod
          cache-dependency-path: |
            features/platform/common/go.sum
            features/inbound/orchestrator/go.sum

      - name: Restore Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-mail-lab-${{ hashFiles('features/platform/common/go.sum', 'features/inbound/orchestrator/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-mail-lab-
            ${{ runner.os }}-go-build-

      # ── Unit tests (no Docker required) ──────────────────────────────
      # Run pure Go tests first — fast feedback before the slow stack boot.
      # FIX: previously ran `cd features/platform/mail-lab-api && go build/test` which
      # works in a workspace but the setup-go cache-dependency-path referenced
      # features/platform/mail-lab-api/go.sum which doesn't exist, causing spurious
      # cache misses. Tests are now run via workspace (`go test ./services/...`)
      # from the repo root, consistent with go-services-ci.yml.
      - name: Build mail-lab-api
        run: go build ./features/platform/mail-lab-api/...

      - name: Unit tests — mail-lab-api
        run: go test -race -count=1 ./features/platform/mail-lab-api/...

      - name: Unit tests — maillabclient
        run: go test -race -count=1 ./features/platform/common/maillabclient/...

      - name: Unit tests — orchestrator/labhook
        run: go test -race -count=1 ./features/inbound/orchestrator/labhook/...

      # ── Build mail-lab-api binary for CI use ─────────────────────────
      # mail-lab-api runs as a HOST process (not inside compose) — it uses
      # `docker exec` to talk to the mailserver containers. We build the
      # binary here so CI doesn't need go run (which would recompile on the
      # hot path and also requires the module cache to be intact).
      - name: Compile mail-lab-api binary
        run: go build -o /tmp/mail-lab-api ./features/platform/mail-lab-api/cmd/mail-lab-api/

      # ── Boot compose stack ────────────────────────────────────────────
      # FIX 1: removed `--providers=seznam` flag — up.sh has no such flag;
      #         unknown flags cause exit 2. All providers boot unconditionally.
      # FIX 2: pass `--no-api` so up.sh does NOT try to start the Go binary
      #         via nohup using the hardcoded /opt/homebrew/bin/go path (which
      #         only exists on macOS). CI starts the binary in the next step.
      - name: Boot mail-lab stack
        run: |
          chmod +x scripts/mail-lab/up.sh
          bash scripts/mail-lab/up.sh --no-seed --no-api
        timeout-minutes: 12

      # ── Start mail-lab-api as a background process ────────────────────
      # FIX: up.sh with --no-api skips the /opt/homebrew/bin/go nohup path.
      # We start the pre-compiled binary directly so it works on Linux CI.
      # LAB_API_KEY defaults to "dev-only" matching the smoke curl calls below.
      - name: Start mail-lab-api binary
        run: |
          LAB_API_KEY=dev-only /tmp/mail-lab-api &
          echo "mail-lab-api PID=$!"

      # ── Wait for /healthz ─────────────────────────────────────────────
      - name: Wait for mail-lab-api /healthz
        run: |
          set -e
          echo "Polling mail-lab-api on :8090/healthz (max 60s)..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8090/healthz >/dev/null 2>&1; then
              echo "[$i] OK"
              exit 0
            fi
            echo "[$i] not ready, sleeping 2s..."
            sleep 2
          done
          echo "ERROR: /healthz never returned 200"
          docker compose -f infra/docker/mail-lab.yml ps
          docker compose -f infra/docker/mail-lab.yml logs --tail=200
          exit 1

      # ── Smoke tests ───────────────────────────────────────────────────
      # FIX: removed `go run ./features/platform/common/maillabclient/cmd/smoke` —
      #      that directory does not exist. Replaced with direct curl calls
      #      which are the correct integration surface for these smokes.

      - name: Smoke — /healthz shape
        run: |
          OUT=$(curl -sf http://localhost:8090/healthz)
          echo "$OUT" | grep -q '"status":"ok"'
          echo "$OUT" | grep -q '"uptime_seconds"'
          echo "PASS: /healthz shape correct"

      - name: Smoke — list profiles (auth required)
        run: |
          OUT=$(curl -sf -H "X-Lab-Api-Key: dev-only" http://localhost:8090/v1/profile)
          echo "$OUT" | grep -q '"profiles"'
          echo "$OUT" | grep -q '"gmail.lab"'
          echo "$OUT" | grep -q '"seznam.lab"'
          echo "$OUT" | grep -q '"outlook.lab"'
          echo "PASS: all three provider profiles present"

      - name: Smoke — evaluate accept verdict (gmail.lab)
        run: |
          OUT=$(curl -sf -X POST \
            -H "X-Lab-Api-Key: dev-only" \
            -H "Content-Type: application/json" \
            -d '{"sender_mailbox":"a@gmail.lab","recipient_addr":"r@gmail.lab","size_bytes":1000,"has_dkim":true}' \
            http://localhost:8090/v1/profile/gmail.lab/evaluate)
          echo "$OUT"
          echo "$OUT" | grep -q '"decision":"accept"'
          echo "PASS: small message with DKIM accepted"

      - name: Smoke — evaluate reject verdict (oversized)
        run: |
          OUT=$(curl -sf -X POST \
            -H "X-Lab-Api-Key: dev-only" \
            -H "Content-Type: application/json" \
            -d '{"sender_mailbox":"a@gmail.lab","recipient_addr":"r@gmail.lab","size_bytes":99999999}' \
            http://localhost:8090/v1/profile/gmail.lab/evaluate)
          echo "$OUT"
          echo "$OUT" | grep -q '"decision":"reject"'
          echo "PASS: oversized message rejected"

      - name: Smoke — auth gate (no key → 401)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8090/v1/profile)
          [ "$STATUS" = "401" ] || (echo "Expected 401, got $STATUS"; exit 1)
          echo "PASS: unauthenticated request returns 401"

      - name: Smoke — unknown domain → 404
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "X-Lab-Api-Key: dev-only" \
            http://localhost:8090/v1/profile/nonexistent.lab)
          [ "$STATUS" = "404" ] || (echo "Expected 404, got $STATUS"; exit 1)
          echo "PASS: unknown domain returns 404"

      # ── Debug capture (only on failure) ──────────────────────────────
      - name: Capture compose logs (debug)
        if: failure()
        run: |
          docker compose -f infra/docker/mail-lab.yml ps
          docker compose -f infra/docker/mail-lab.yml logs --tail=500

      # ── Teardown ──────────────────────────────────────────────────────
      # Idempotent: `down -v --remove-orphans` is safe to call even if
      # compose never started (exits 0 when nothing is running).
      - name: Tear down mail-lab stack
        if: always() && inputs.keep_running != 'true'
        run: |
          docker compose -f infra/docker/mail-lab.yml down -v --remove-orphans || true
          pkill -f mail-lab-api || true
