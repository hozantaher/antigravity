name: CodeQL Security Analysis

on:
  # Per docs/playbooks/ci-bypass.md scope reduction: drop pull_request trigger
  # to fit GH Actions free tier. Security analysis runs on main pushes + weekly.
  push:
    branches: [main]
  schedule:
    - cron: '30 3 * * 1'  # Monday 03:30 UTC
  workflow_dispatch: # manual trigger for ad-hoc PR security check

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-javascript:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

  analyze-go:
    name: Analyze Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: features/inbound/orchestrator/go.mod
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          queries: security-and-quality
      - name: Build for CodeQL
        run: go build ./features/inbound/orchestrator/... ./features/outreach/campaigns/... ./features/acquisition/contacts/... ./features/platform/common/...
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"
