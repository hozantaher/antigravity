name: Playbook Drill — Mailbox Fraud-Lock Recovery (AO6)

# ═══════════════════════════════════════════════════════════════════════════
# TRIGGER — výhradně manuální spuštění (workflow_dispatch).
#
# Proč není automatické:
#   Drill modifikuje testovací schránku id=11583 v databázi (i přes rollback
#   na konci). Automatické spouštění na každém PR by bylo destruktivní
#   pro soukromé testovací prostředí a zbytečně zatěžující.
#
# Vstupní parametry:
#   - bff_url: URL BFF serveru (výchozí http://localhost:18001 — nutno přepsat
#     pro Railway nebo jiný deployed environment)
#   - mailbox_id: id schránky pro drill (výchozí 11583)
#
# Požadované secrets:
#   - DATABASE_URL — připojení k Postgres (Railway nebo testovací instance)
#   - OUTREACH_API_KEY — API klíč pro BFF (volitelný, drill funguje i bez)
#
# Po úspěšném spuštění:
#   Přidej do docs/playbooks/mailbox-fraud-lock-recovery.md řádek:
#   > Tested: YYYY-MM-DD OK (viz run #<run_id>)
# ═══════════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      bff_url:
        description: 'BFF base URL (e.g. http://localhost:18001 or deployed Railway URL)'
        required: false
        default: 'http://localhost:18001'
      mailbox_id:
        description: 'Test mailbox ID (default 11583 — test fixture mailbox)'
        required: false
        default: '11583'

jobs:
  fraud-lock-drill:
    name: Fraud-Lock Recovery Drill (AO6)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ověřit prerekvizity
        run: |
          echo "Drill spuštěn pro schránku id=${{ inputs.mailbox_id }}"
          echo "BFF URL: ${{ inputs.bff_url }}"
          if [[ -z "$DATABASE_URL" ]]; then
            echo "ERROR: SECRET DATABASE_URL není nastaven." >&2
            exit 1
          fi
          # Ověřit, že psql je dostupný
          psql --version
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Ověřit dostupnost Postgres
        run: |
          psql "$DATABASE_URL" -c "SELECT 1 AS db_ok" -t | grep -q "1"
          echo "Postgres dostupná."
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        timeout-minutes: 1

      - name: Spustit drill
        run: |
          chmod +x scripts/drills/mailbox-fraud-lock-drill.sh
          bash scripts/drills/mailbox-fraud-lock-drill.sh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OUTREACH_API_KEY: ${{ secrets.OUTREACH_API_KEY }}
          BFF_BASE_URL: ${{ inputs.bff_url }}
          DRILL_MAILBOX_ID: ${{ inputs.mailbox_id }}
        timeout-minutes: 5

      - name: Shrnutí výsledku
        if: always()
        run: |
          echo "### Výsledek vrtacího cvičení" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parametr | Hodnota |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Schránka | id=${{ inputs.mailbox_id }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| BFF URL | ${{ inputs.bff_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Playbook | docs/playbooks/mailbox-fraud-lock-recovery.md |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Sprint | AO6 |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Po úspěšném průběhu: přidej \`Tested: $(date +%Y-%m-%d) OK (run #${{ github.run_id }})\` do playbooku." >> "$GITHUB_STEP_SUMMARY"
