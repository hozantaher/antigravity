name: Triage CI failures

# Runs after primary test workflows complete. If they failed, parses junit/vitest
# output and creates one GH issue per unique failing test (deduped by title hash).

on:
  workflow_run:
    workflows:
      - 'Go services CI'
      - 'Node services CI'
      - 'Test quality'
    types: [completed]
  workflow_dispatch:

permissions:
  issues: write
  actions: read

jobs:
  triage:
    # Per docs/playbooks/ci-bypass.md scope reduction: never fail this workflow,
    # so cascade failures from primary CI don't double-count in failure metrics.
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Download failure artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .triage-artifacts/
        continue-on-error: true

      - name: Triage failures into issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_RUN_URL: ${{ github.event.workflow_run.html_url || github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
        run: |
          if [ ! -d .triage-artifacts ]; then
            echo "No artifacts to triage"
            exit 0
          fi
          node scripts/triage-failures.mjs --artifacts=.triage-artifacts --ci-url="$CI_RUN_URL" || true
          exit 0  # never fail the triage workflow itself
