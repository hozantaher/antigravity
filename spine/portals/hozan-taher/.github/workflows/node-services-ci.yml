name: Node Services CI

on:
  push:
    branches: [main, 'wm/development', 'wm/tests']
    paths:
      - 'features/platform/mcp/**'
      - 'features/platform/worker/**'
      - 'features/acquisition/scrapers/**'
      - '.github/workflows/node-services-ci.yml'
  pull_request:
    paths:
      - 'features/platform/mcp/**'
      - 'features/platform/worker/**'
      - 'features/acquisition/scrapers/**'
      - '.github/workflows/node-services-ci.yml'

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mcp
            path: features/platform/mcp
            filter: '@hozan/mcp'
          - name: worker
            path: features/platform/worker
            filter: '@hozan/worker'
          - name: scrapers
            path: features/acquisition/scrapers
            filter: '@hozan/scrapers'

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ matrix.path }}/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm --filter ${{ matrix.filter }} --if-present run test
