name: CAD subsystem-map drift detection

# Daily cron that re-surveys each subsystem dir and diffs against the
# committed MAP. Drift > N items writes a report to reports/subsystem-drift/
# which the operator's `pnpm report` consumes (CAD-A4 / issue #563).
#
# Lightweight design: per-subsystem `git diff --stat` of files in the
# subsystem dir vs the MAP's last-edited commit. A real semantic survey
# (Explore agent) is too expensive for daily; this lightweight diff
# catches the common drift signal — files added/removed/significantly
# changed since MAP last touched.
#
# Operator may override with PR label `skip-drift` (rare emergency).

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily
  workflow_dispatch:     # manual trigger from Actions tab

jobs:
  drift:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-drift') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history needed for git log/diff vs MAP edit time

      - name: Detect drift per subsystem
        id: detect
        shell: bash
        run: |
          set -e
          mkdir -p reports/subsystem-drift/$(date +%Y-%m-%d)

          # Subsystem → directory mapping (matches /discover skill)
          declare -A SUBSYSTEMS=(
            [anti-trace]="features/outreach/campaigns features/outreach/relay"
            [imap-inbound]="features/inbound/orchestrator/imap"
            [dashboard-bff]="features/platform/outreach-dashboard/server.js features/platform/outreach-dashboard/src/server-routes"
            [scrapers]="features/acquisition/scrapers"
            [worker]="features/platform/worker"
            [content-render]="features/outreach/campaigns/content features/platform/common/humanize"
            [protections]="features/inbound/orchestrator/protections"
            [common-libs]="features/platform/common"
          )

          TOTAL_DRIFT=0
          REPORT_DATE=$(date +%Y-%m-%d)

          for SUBSYSTEM in "${!SUBSYSTEMS[@]}"; do
            MAP="docs/subsystem-maps/${SUBSYSTEM}.md"
            if [ ! -f "$MAP" ]; then
              continue
            fi
            MAP_LAST_COMMIT=$(git log -1 --format=%H -- "$MAP")
            DIRS="${SUBSYSTEMS[$SUBSYSTEM]}"
            CHANGES=$(git log --pretty=format:'%h %s' "${MAP_LAST_COMMIT}..HEAD" -- $DIRS 2>/dev/null | head -50)
            DRIFT_COUNT=$(echo "$CHANGES" | grep -c . || echo 0)
            TOTAL_DRIFT=$((TOTAL_DRIFT + DRIFT_COUNT))

            REPORT="reports/subsystem-drift/${REPORT_DATE}/${SUBSYSTEM}.md"
            cat > "$REPORT" <<EOF
          # Subsystem drift — ${SUBSYSTEM} (${REPORT_DATE})

          - **MAP last commit:** ${MAP_LAST_COMMIT}
          - **Drift count:** ${DRIFT_COUNT}
          - **Severity:** $([ $DRIFT_COUNT -gt 5 ] && echo "critical" || ([ $DRIFT_COUNT -gt 0 ] && echo "warn" || echo "none"))

          ## Commits since MAP last edit

          \`\`\`
          ${CHANGES:-(none)}
          \`\`\`

          ## Resolution

          If drift_count > 5: re-run \`pnpm rebuild-claude-knowledge\` (CAD-A5)
          to re-extract the MAP via Explore agent. Compare and update.
          EOF
            echo "  $SUBSYSTEM: $DRIFT_COUNT changes"
          done

          echo "TOTAL_DRIFT=$TOTAL_DRIFT" >> $GITHUB_OUTPUT
          echo "REPORT_DATE=$REPORT_DATE" >> $GITHUB_OUTPUT

      - name: Commit drift report
        if: steps.detect.outputs.TOTAL_DRIFT != '0'
        shell: bash
        run: |
          git config user.name "cad-drift-bot"
          git config user.email "noreply@anthropic.com"
          git add reports/subsystem-drift/${{ steps.detect.outputs.REPORT_DATE }}/
          git commit -m "chore(cad-drift): daily subsystem-map drift report ${{ steps.detect.outputs.REPORT_DATE }}" || true
          # Don't push directly to main — open PR for operator review.
          git checkout -b "chore/cad-drift-${{ steps.detect.outputs.REPORT_DATE }}" || true
          git push origin "chore/cad-drift-${{ steps.detect.outputs.REPORT_DATE }}" || true

      - name: Sentry alert on high drift
        if: steps.detect.outputs.TOTAL_DRIFT > 20
        run: |
          echo "::warning::CAD drift exceeded 20 commits across all subsystems — operator review needed"
