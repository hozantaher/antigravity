name: Test Quality (Adversarial)

on:
  pull_request:
    paths:
      - 'features/platform/outreach-dashboard/**'
      - '.github/workflows/test-quality.yml'
  schedule:
    # Weekly mutation + drift sweep — Sunday 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  hallucination-score:
    name: Hallucination Score (per-PR ratchet)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: features/platform/outreach-dashboard
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v6
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
        working-directory: .

      # Generate every input the score reads
      - name: Test linkage map
        run: node scripts/test-prod-linkage.mjs
      - name: Assertion density audit
        run: node scripts/assertion-density.mjs
      - name: Inverted-fault transform (dry)
        run: node scripts/inverted-fault-harness.mjs

      # Aggregate score
      - name: Compute Hallucination Score
        id: score
        run: |
          node scripts/hallucination-score.mjs > score-output.txt
          cat score-output.txt
          score=$(jq -r '.score' hallucination-score.json)
          severity=$(jq -r '.severity' hallucination-score.json)
          echo "score=$score" >> "$GITHUB_OUTPUT"
          echo "severity=$severity" >> "$GITHUB_OUTPUT"

      - name: Compare against base-branch baseline
        id: ratchet
        if: github.event_name == 'pull_request'
        run: |
          # Fetch baseline from base
          git fetch origin "${{ github.base_ref }}" --depth=1
          git show "origin/${{ github.base_ref }}:features/platform/outreach-dashboard/hallucination-score.baseline.json" \
            > baseline.tmp.json 2>/dev/null || echo '{"score": 0}' > baseline.tmp.json
          base=$(jq -r '.score // 0' baseline.tmp.json)
          cur=$(jq -r '.score' hallucination-score.json)
          drop=$(node -e "console.log(($base - $cur).toFixed(1))")
          echo "drop=$drop" >> "$GITHUB_OUTPUT"
          if [ "$(node -e "console.log($drop > 5 ? 1 : 0)")" = "1" ]; then
            echo "::error::Hallucination Score dropped $drop pts ($base → $cur). Max drop: 5."
            exit 1
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: hallucination-score
          message: |
            ## Hallucination Score

            **Current:** `${{ steps.score.outputs.score }}` (${{ steps.score.outputs.severity }})
            **Drop vs base:** `${{ steps.ratchet.outputs.drop || 'n/a' }}`

            <details><summary>Component breakdown</summary>

            ```
            $(cat features/platform/outreach-dashboard/score-output.txt 2>/dev/null || echo "score not computed")
            ```
            </details>

      - name: Upload score artifact
        uses: actions/upload-artifact@v4
        with:
          name: hallucination-score
          path: features/platform/outreach-dashboard/hallucination-score.json
          retention-days: 30

  weekly-mutation:
    name: Mutation testing (weekly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: features/platform/outreach-dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v6
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Stryker mutation suite (bottleneck-unblock)
        run: pnpm exec stryker run stryker.bottleneck.config.json || true
      - name: Mutation propose-test pipeline
        run: node scripts/mutation-propose-tests.mjs --report=reports/mutation/mutation.json || true
      - name: Auto-create issue on score drop
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const score = JSON.parse(fs.readFileSync('features/platform/outreach-dashboard/hallucination-score.json', 'utf8'))
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Hallucination Score dropped to ${score.score} (${score.severity})`,
              body: `Weekly run flagged a score regression.\n\nComponents:\n${JSON.stringify(score.components, null, 2)}`,
              labels: ['test-quality', 'auto'],
            })
