name: Bot worker

# Cron-driven autonomous fix agent. Picks one P0/P1 issue with automation/ok,
# spawns Claude in an isolated worktree, opens a PR. Never merges.
#
# Hard guards:
# - Runs only from wm/development (job-level if check)
# - presence.sh must say "idle" (skip if user has commits in last 90 min)
# - Max 3 open [bot] PRs at once
# - Daily limits via .bot-state.json (committed back to repo)
# - 45 min timeout
# - permissions: only contents:write + pull-requests:write

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip presence check (use only for testing)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: bot-worker
  cancel-in-progress: false

jobs:
  bot:
    # Hard guard: never run from main
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MAX_BOT_PRS_OPEN: '3'
      MAX_BOT_RUNS_PER_DAY: '20'
      MAX_BOT_PRS_PER_DAY: '10'
      BOT_GH_USER: 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: wm/development
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # ── Guard 1: presence (user active = skip) ────────────────
      - name: Check presence
        if: ${{ inputs.force != true }}
        run: |
          status=$(bash scripts/presence.sh)
          echo "presence=$status"
          if [ "$status" != "idle" ]; then
            echo "User is $status — bot skipping this run."
            exit 0
          fi

      # ── Guard 2: too many open bot PRs ────────────────────────
      - name: Check open bot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          open=$(gh pr list --label automation/bot --state open --json number --jq 'length')
          echo "open_bot_prs=$open"
          if [ "$open" -ge "$MAX_BOT_PRS_OPEN" ]; then
            echo "Too many open bot PRs ($open >= $MAX_BOT_PRS_OPEN). Skipping."
            exit 0
          fi

      # ── Guard 3: daily limit ──────────────────────────────────
      - name: Check daily limit
        run: |
          today=$(date -u +%Y-%m-%d)
          state=".bot-state.json"
          if [ ! -f "$state" ]; then echo '{}' > "$state"; fi
          runs_today=$(jq -r --arg d "$today" '.[$d].runs // 0' "$state")
          prs_today=$(jq -r --arg d "$today" '.[$d].prs // 0' "$state")
          echo "runs_today=$runs_today prs_today=$prs_today"
          if [ "$runs_today" -ge "$MAX_BOT_RUNS_PER_DAY" ]; then
            echo "Daily run limit reached ($runs_today)."; exit 0
          fi
          if [ "$prs_today" -ge "$MAX_BOT_PRS_PER_DAY" ]; then
            echo "Daily PR limit reached ($prs_today)."; exit 0
          fi

      # ── Claim a task ──────────────────────────────────────────
      - name: Claim issue
        id: claim
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          out=$(node scripts/agent-claim.mjs)
          echo "$out"
          if echo "$out" | grep -q NO_CLAIMABLE; then
            echo "no_claim=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "$out" >> $GITHUB_OUTPUT

      # ── Set up isolated worktree ──────────────────────────────
      - name: Create bot worktree
        if: steps.claim.outputs.no_claim != 'true'
        run: |
          BR="auto/issue-${{ steps.claim.outputs.ISSUE_NUMBER }}"
          git worktree add ../bot-workspace -b "$BR"
          echo "WORKTREE=../bot-workspace" >> $GITHUB_ENV
          echo "BRANCH=$BR" >> $GITHUB_ENV

      # ── Spawn Claude Code (placeholder — implement once Claude Code Action is available) ──
      - name: Run autonomous fix
        if: steps.claim.outputs.no_claim != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.claim.outputs.ISSUE_NUMBER }}
          ISSUE_AREA: ${{ steps.claim.outputs.ISSUE_AREA }}
        run: |
          set -euo pipefail
          cd "$WORKTREE"
          # PLACEHOLDER: invocation of Claude Code Action / API.
          # Until then this step exists as a stub so the workflow scaffolding
          # is reviewable. See docs/playbooks/bot-operations.md for runbook.
          echo "[bot] Would now spawn agent for issue #$ISSUE_NUMBER (area=$ISSUE_AREA)"
          echo "[bot] Agent prompt: .github/agents/autonomous-fix.md"
          echo "[bot] Worktree: $(pwd)"
          echo "[bot] Stubbing: no actual edits yet."

      # ── Bookkeeping: bump daily counters ──────────────────────
      - name: Update bot-state
        if: always()
        run: |
          today=$(date -u +%Y-%m-%d)
          state=".bot-state.json"
          tmp=$(mktemp)
          jq --arg d "$today" '
            .[$d].runs = (.[$d].runs // 0) + 1
            | .[$d].last_run_at = (now | todateiso8601)
          ' "$state" > "$tmp" && mv "$tmp" "$state"
          # commit only if this is a real run (not skipped early)
          if [ "${{ steps.claim.outputs.no_claim }}" != "true" ]; then
            git add .bot-state.json || true
            git -c user.name=github-actions -c user.email=github-actions@github.com \
              commit -m "chore(bot): bump runs counter [skip ci]" || true
            git push origin wm/development || true
          fi

      # ── Cleanup ───────────────────────────────────────────────
      - name: Remove bot worktree
        if: always() && env.WORKTREE != ''
        run: |
          git worktree remove "$WORKTREE" --force || true
          git branch -D "$BRANCH" || true
