name: Sentry triage

on:
  schedule:
    - cron: '7 */6 * * *'   # every 6 hours, offset to avoid noise
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print without creating issues'
        type: boolean
        default: false

permissions:
  issues: write

concurrency:
  group: sentry-triage
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run Sentry triage
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECTS: ${{ vars.SENTRY_PROJECTS }}
          MIN_COUNT_24H: ${{ vars.MIN_COUNT_24H || '100' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN secret not configured — skipping"
            exit 0
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/sentry-triage.mjs --dry-run
          else
            node scripts/sentry-triage.mjs
          fi
