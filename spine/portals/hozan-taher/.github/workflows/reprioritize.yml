name: Reprioritize backlog

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print changes without applying them'
        type: boolean
        default: false

permissions:
  issues: write
  pull-requests: read

concurrency:
  group: reprioritize
  cancel-in-progress: false

jobs:
  reprioritize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need full history for `git log --since=24h`

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run reprioritizer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/reprioritize.mjs --dry-run
          else
            node scripts/reprioritize.mjs
          fi
