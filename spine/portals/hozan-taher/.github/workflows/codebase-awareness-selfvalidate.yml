name: CAD self-validation (weekly)

# Sprint A5 (#564) — weekly self-validation loop.
# Picks a random subsystem MAP (week-seeded), generates a blind quiz,
# and logs knowledge gaps when divergence > threshold.
#
# In automated mode this workflow:
#   1. Generates the quiz for the week's subsystem
#   2. Runs the comparison in quiz-only mode (no AI answer — CI can't self-quiz)
#   3. Uploads the quiz as an artifact for operator review
#   4. Opens an issue when a gap log entry exists (triggered by exit 1)
#
# Full AI comparison (stdin answer path) requires a Claude Code session.
# The operator can run manually:
#   node scripts/codebase-awareness/self-validate.mjs --subsystem random --quiz-only
# and then paste the quiz into a Claude Code session.

on:
  schedule:
    - cron: '0 5 * * 1'   # Every Monday 05:00 UTC
  workflow_dispatch:
    inputs:
      subsystem:
        description: 'Subsystem to validate (or "random")'
        required: false
        default: 'random'
      gap_threshold:
        description: 'Gap threshold (default 3)'
        required: false
        default: '3'

permissions:
  contents: write
  issues: write

concurrency:
  group: cad-self-validate
  cancel-in-progress: false

jobs:
  self-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUBSYSTEM: ${{ github.event.inputs.subsystem || 'random' }}
      GAP_THRESHOLD: ${{ github.event.inputs.gap_threshold || '3' }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Configure git author
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Generate quiz (quiz-only mode)
        id: quiz
        run: |
          mkdir -p reports/codebase-awareness
          set +e
          node scripts/codebase-awareness/self-validate.mjs \
            --subsystem="${SUBSYSTEM}" \
            --gap-threshold="${GAP_THRESHOLD}" \
            --quiz-only \
            --output=reports/codebase-awareness/quiz-$(date -u +%Y-%m-%d).md
          rc=$?
          set -e
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          echo "quiz_file=reports/codebase-awareness/quiz-$(date -u +%Y-%m-%d).md" >> "$GITHUB_OUTPUT"
          today=$(date -u +%Y-%m-%d)
          echo "today=$today" >> "$GITHUB_OUTPUT"

      - name: Upload quiz artifact
        uses: actions/upload-artifact@v4
        with:
          name: cad-quiz-${{ steps.quiz.outputs.today }}
          path: ${{ steps.quiz.outputs.quiz_file }}
          retention-days: 30

      - name: Check gap log for new entries
        id: gap_check
        run: |
          gap_file="reports/codebase-awareness/knowledge-gaps.jsonl"
          if [ -f "$gap_file" ]; then
            today=$(date -u +%Y-%m-%d)
            new_gaps=$(grep "\"date\":\"${today}\"" "$gap_file" 2>/dev/null | wc -l | tr -d ' ')
            echo "new_gaps=$new_gaps" >> "$GITHUB_OUTPUT"
          else
            echo "new_gaps=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue for knowledge gap
        if: steps.gap_check.outputs.new_gaps != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TODAY: ${{ steps.quiz.outputs.today }}
          QUIZ_FILE: ${{ steps.quiz.outputs.quiz_file }}
        run: |
          gap_count="${{ steps.gap_check.outputs.new_gaps }}"
          subsystem="${SUBSYSTEM}"
          body=$(cat <<EOF
          ## CAD Self-Validation Knowledge Gap — ${TODAY}

          The weekly self-validation loop detected **${gap_count}** knowledge gap(s) for the \`${subsystem}\` subsystem.

          ### Action required
          1. Review the quiz in the [workflow artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) or run locally:
             \`\`\`
             node scripts/codebase-awareness/self-validate.mjs --subsystem=${subsystem} --quiz-only
             \`\`\`
          2. Paste the quiz into a Claude Code session and run the comparison.
          3. If divergence confirmed, run re-discovery:
             \`\`\`
             pnpm rebuild-claude-knowledge --drift-threshold=0
             \`\`\`
          4. Update \`docs/subsystem-maps/${subsystem}.md\` with any corrections.
          5. Close this issue after MAP is refreshed.

          ### Initiative
          [CAD-A5 (#564)](../docs/initiatives/2026-05-01-codebase-awareness-discipline.md#sprint-a5)

          Source: \`.github/workflows/codebase-awareness-selfvalidate.yml\`
          EOF
          )
          gh issue create \
            --title "cad(self-validate): knowledge gap detected in ${subsystem} ${TODAY}" \
            --body "$body" \
            --label "automation/ok" || echo "Issue creation failed (label may not exist) — continuing"

      - name: Summary
        if: steps.gap_check.outputs.new_gaps == '0'
        env:
          TODAY: ${{ steps.quiz.outputs.today }}
        run: |
          echo "No knowledge gaps detected for ${TODAY}. Quiz artifact uploaded."
