name: Weekly test health

on:
  schedule:
    - cron: '0 8 * * 1'   # every Monday 8:00 UTC
  workflow_dispatch:

permissions:
  contents: write       # commit baseline updates
  issues: write

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run health check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f scripts/test-health.mjs ]; then
            echo "scripts/test-health.mjs not yet implemented (S5.1)"
            echo "Skipping until then."
            exit 0
          fi
          node scripts/test-health.mjs
