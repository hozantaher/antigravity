name: Merge Gate

# P2-1 (#90): Gate PRs into main on (a) all CI checks green, (b) no merge
# conflicts with main, (c) BOARD.md doc-pointer exception documented.
#
# This workflow runs on every PR targeting main and blocks merge if any
# of the invariants fails. Complements .github/workflows/{go,node}-services-ci.yml
# which already run per-push — this one aggregates their results + adds
# merge-conflict detection + docs-only fast-path.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  # ── Gate 1: merge-conflict detection ─────────────────────────
  no-conflicts:
    name: no merge conflicts with main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for conflicts
        run: |
          git fetch origin main
          # `git merge --no-commit` returns non-zero if conflicts exist.
          # Use --no-ff to force a merge commit attempt (exposes conflicts
          # that fast-forward would hide).
          if ! git merge --no-commit --no-ff origin/main; then
            echo "::error::PR has merge conflicts with origin/main — rebase required"
            git merge --abort || true
            exit 1
          fi
          git merge --abort || true

  # ── Gate 2: docs-only fast-path ──────────────────────────────
  # Per CLAUDE.md exception: BOARD.md + CLAUDE.md doc-pointer edits can
  # bypass the full CI matrix. This job detects and marks the PR.
  docs-only:
    name: detect docs-only PR
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.check.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: check
        run: |
          git fetch origin main
          CHANGED=$(git diff --name-only origin/main...HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          # Docs-only if every changed file matches the allowed doc-pointer list.
          if echo "$CHANGED" | grep -qvE '^(docs/handoff/.*\.md|CLAUDE\.md|docs/initiatives/.*\.md|docs/playbooks/.*\.md)$'; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "PR touches non-doc files — full CI matrix required"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "PR is docs-only — fast-path eligible"
          fi

  # ── Gate 3: aggregate CI check status ────────────────────────
  # Waits for go-services-ci + node-services-ci to report success.
  # Uses the GitHub Checks API to read prior workflow runs (triggered by
  # the same PR head SHA) rather than re-running them.
  ci-checks-green:
    name: all CI workflows green
    needs: [no-conflicts, docs-only]
    runs-on: ubuntu-latest
    if: needs.docs-only.outputs.docs_only != 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Wait for CI workflows
        uses: actions/github-script@v7
        with:
          script: |
            const required = [
              'Go Services CI',
              'Node Services CI',
            ];
            const sha = context.payload.pull_request.head.sha;
            const maxWaitMin = 20;
            const pollSec = 30;
            const deadline = Date.now() + maxWaitMin * 60 * 1000;

            while (Date.now() < deadline) {
              const { data } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: sha,
              });
              const byName = new Map();
              for (const check of data.check_runs) {
                // Pick the most recent run per name.
                const existing = byName.get(check.name);
                if (!existing || new Date(check.started_at) > new Date(existing.started_at)) {
                  byName.set(check.name, check);
                }
              }

              const missing = required.filter((n) => !byName.has(n));
              const inProgress = required.filter((n) => {
                const c = byName.get(n);
                return c && c.status !== 'completed';
              });
              const failed = required.filter((n) => {
                const c = byName.get(n);
                return c && c.status === 'completed' && c.conclusion !== 'success';
              });

              if (failed.length > 0) {
                core.setFailed(`Required checks FAILED: ${failed.join(', ')}`);
                return;
              }
              if (missing.length === 0 && inProgress.length === 0) {
                core.info('All required CI checks green');
                return;
              }

              core.info(`Waiting for: missing=[${missing.join(',')}] inProgress=[${inProgress.join(',')}]`);
              await new Promise((r) => setTimeout(r, pollSec * 1000));
            }
            core.setFailed(`Timed out after ${maxWaitMin}min waiting for CI`);

  # ── Gate 4: final merge-ready status check ──────────────────
  merge-ready:
    name: merge-ready
    needs: [no-conflicts, docs-only, ci-checks-green]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize
        run: |
          echo "no-conflicts: ${{ needs.no-conflicts.result }}"
          echo "docs-only: ${{ needs.docs-only.outputs.docs_only }}"
          echo "ci-checks-green: ${{ needs.ci-checks-green.result }}"

          # Pass conditions:
          #   - no-conflicts must be success
          #   - ci-checks-green must be success OR docs_only=true (and thus skipped)
          if [[ "${{ needs.no-conflicts.result }}" != "success" ]]; then
            echo "::error::Merge blocked: conflicts with main"
            exit 1
          fi
          if [[ "${{ needs.docs-only.outputs.docs_only }}" == "true" ]]; then
            echo "Docs-only fast-path — merge allowed"
            exit 0
          fi
          if [[ "${{ needs.ci-checks-green.result }}" != "success" ]]; then
            echo "::error::Merge blocked: CI checks not green"
            exit 1
          fi
          echo "All gates green — merge allowed"
