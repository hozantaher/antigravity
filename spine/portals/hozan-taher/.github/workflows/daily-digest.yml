name: Daily bot digest

on:
  schedule:
    - cron: '0 8 * * *'   # 8:00 UTC = ~9:00–10:00 Europe/Prague
  workflow_dispatch:

permissions:
  issues: read
  pull-requests: read
  discussions: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Generate digest
        id: gen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/daily-digest.mjs > digest.md
          echo "today=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Post to Discussions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the "Bot Reports" category
          CAT_ID=$(gh api graphql -f query='
            query($owner:String!,$repo:String!){
              repository(owner:$owner,name:$repo){
                discussionCategories(first:20){nodes{id name}}
              }
            }' -F owner=${{ github.repository_owner }} -F repo=${{ github.event.repository.name }} \
            | jq -r '.data.repository.discussionCategories.nodes[] | select(.name=="Bot Reports") | .id')

          if [ -z "$CAT_ID" ] || [ "$CAT_ID" = "null" ]; then
            echo "Category 'Bot Reports' not found — create it manually in Discussions UI."
            cat digest.md
            exit 0
          fi

          REPO_ID=$(gh api graphql -f query='
            query($owner:String!,$repo:String!){
              repository(owner:$owner,name:$repo){id}
            }' -F owner=${{ github.repository_owner }} -F repo=${{ github.event.repository.name }} \
            | jq -r '.data.repository.id')

          BODY=$(cat digest.md | jq -Rsa .)
          gh api graphql -f query='
            mutation($repoId:ID!,$catId:ID!,$title:String!,$body:String!){
              createDiscussion(input:{repositoryId:$repoId,categoryId:$catId,title:$title,body:$body}){
                discussion{url}
              }
            }' -F repoId="$REPO_ID" -F catId="$CAT_ID" \
            -F title="Bot Report ${{ steps.gen.outputs.today }}" \
            -F body="$(cat digest.md)" || echo "post failed"
