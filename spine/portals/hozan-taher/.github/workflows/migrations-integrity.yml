name: migrations-integrity

# Blocks PRs that introduce a duplicate 3-digit numeric prefix in
# scripts/migrations/*.sql — prevents recurrence of incident in PR #1035/#1047.
#
# Also blocks PRs where a new migration file lacks an "INSERT INTO schema_migrations"
# ledger entry — prevents recurrence of memory feedback_migration_apply_immediately
# violation (076_ap5_mailbox_env_boundary was missing its ledger entry at commit time).

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/migrations/**'

permissions:
  contents: read

jobs:
  check-prefix-uniqueness:
    name: no duplicate migration prefixes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check migration prefix integrity
        run: bash scripts/migrations/check-integrity.sh

      - name: Run self-tests
        run: bash scripts/migrations/check-integrity.test.sh

  check-ledger-entries:
    name: migration ledger entries present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check migration ledger entries (--strict)
        run: bash scripts/migrations/check-integrity.sh --strict

      - name: Run ledger self-tests
        run: bash scripts/migrations/check-integrity.test.sh --ledger
