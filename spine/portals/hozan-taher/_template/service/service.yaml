# TEMPLATE: kopíruj tento adresář do services/<domain>/ a nahraď všechny
# TEMPLATE: <placeholder> hodnoty konkrétními údaji domény.
# TEMPLATE: viz docs/playbooks/DOMAIN-MIGRATION.md pro plný postup.

# Manifest domény / služby. Single source of truth pro:
# - ownership
# - runtime deploy target
# - public API kontrakty
# - upstream/downstream závislosti
# - invarianty (co musí vždy platit)
# - SLO cíle
schema_version: "1.0"

name: "<service-name>"            # např. "mailboxes", "campaigns", "relay"
domain: "<domain-name>"           # typicky stejné jako name; sub-services mají parent domain
owner: "<owner>"                  # GitHub handle / jméno / team

# Aktuální status migrace. Viz docs/architecture/DOMAIN-MAP.md.
# planned | in-progress | active | legacy
status: "planned"

# Kam se deployuje. Volby:
# - railway (jedna Railway service = jedna deployable jednotka)
# - sub-service (logický namespace, sdílí deploy s parent)
# - library (pnpm package, ne runtime service)
# - infra (ne-deployable; CI/scripts/config)
deploy_target: "<railway|sub-service|library|infra>"
railway_service_name: "<optional railway service name, pokud deploy_target=railway>"

# Jaké technologie služba používá. Ovlivňuje toolchain, CI, Dockerfile.
technology:
  - "<go | typescript | python | react | ...>"

# Závislosti mezi doménami. Držet striktně one-way kde to jde.
dependencies:
  upstream: []                    # domény, které tato volá (např. ["relay", "postgres"])
  downstream: []                  # domény, které tuto volají (např. ["campaigns", "dashboard"])

# Public API této domény. Všechny 3 sekce jsou optional dle reality.
public_api:
  rest: []                        # např. ["/api/mailboxes/*", "/api/watchdog/*"]
  events: []                      # např. ["mailbox.health_changed", "bounce.received"]
  schemas: []                     # např. ["schemas/mailbox.openapi.yaml"]

# Co musí vždy platit. Invarianty chrání data integrity a UX kontrakty.
# Ideálně 3-6 ostrých pravidel, ne marketing text.
invariants:
  - "<invariant-1>"               # např. "žádný duplicate send pro (contact_id, step_id)"
  - "<invariant-2>"

# Service Level Objectives. Měřitelné, nikoli aspirační.
slo:
  availability: "<např. 99.5%>"
  latency_p95_ms: 0               # 0 = neurčeno; jinak konkrétní číslo
  error_budget: "<např. 30 min/month>"

# Logický breakdown na pod-services. Sub-services NEJSOU samostatné deployy,
# ale sdílejí deploy s parent. Viz Cílový layout v initiative dokumentu.
sub_services: []
#   - name: "<sub-service-name>"
#     purpose: "<1-řádkový popis>"
#     path: "internal/<sub-service-name>/"

# Related dokumenty. Odkazy relativní vůči service root.
docs:
  readme: "README.md"
  runbooks: []                    # např. ["../../docs/playbooks/runbook-<service>-restart.md"]
  adrs: []                        # např. ["../../docs/decisions/ADR-NNN-<slug>.md"]
