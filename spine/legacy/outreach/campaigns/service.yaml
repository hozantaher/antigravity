# service.yaml — campaigns domain
schema_version: "1.0"

name: campaigns
domain: outreach
owner: tomas
status: planned                   # M3.1 scaffold only, migration pending
deploy_target: sub-service        # shares machinery-outreach deploy
railway_service_name: machinery-outreach

technology:
  - go
  - react                         # UI slice ships from services/campaigns/ui

migration_state:
  M3.1: in-progress                # scaffold
  M3.2: planned                    # promote campaign/sender/warmup out of internal/
  M3.3: planned                    # carve web handlers for /api/campaigns/*
  M3.4: planned                    # separate go.mod + go.work replace

dependencies:
  upstream:
    - mailboxes/mailbox            # sender needs mailbox registry
    - relay                        # send path via anti-trace-relay
    - outreach/humanize            # tone/circadian pacing
    - contacts                     # target audience source
    - database/outreach_campaigns + outreach_campaign_contacts + outreach_mailboxes
  downstream:
    - intelligence                 # campaign metrics aggregation
    - dashboard                    # UI: /campaigns, /campaigns/:id

public_api:
  rest:
    - GET    /api/campaigns
    - POST   /api/campaigns
    - GET    /api/campaigns/:id
    - PATCH  /api/campaigns/:id
    - DELETE /api/campaigns/:id
    - POST   /api/campaigns/:id/status       # active/paused/completed
    - GET    /api/campaigns/:id/preflight    # 5-check gate before unpause
    - GET    /api/campaigns/:id/steps
    - GET    /api/campaigns/:id/contacts
    - GET    /api/campaigns/:id/send-log
  events:
    - campaign.status_changed
    - send.completed
    - send.bounced
  schemas: schemas/openapi.yaml

invariants:
  - "Žádný duplicate send pro (contact_id, campaign_id, step_id) — CAS gate v runner"
  - "Preflight MUSÍ být green before status=active (viz T-U01 gate)"
  - "Warmup respekt — campaign runner nikdy nepřekročí mailbox daily cap"
  - "Send window (CZ working hours) uzamčen — no sends mimo 08:00–17:00 Europe/Prague"

slo:
  availability: "99.0%"
  preflight_p95_ms: 500
  send_attempt_p95_ms: 4000      # via relay + SMTP

sub_services:
  - name: campaign
    purpose: Campaign CRUD + state machine
    path: internal/campaign/
  - name: sender
    purpose: SMTP send engine + per-domain circuit breaker
    path: internal/sender/
  - name: warmup
    purpose: Gradual ramp-up + daily cap tracking
    path: internal/warmup/
  - name: token
    purpose: Message token replacement engine
    path: internal/token/

docs:
  readme: README.md
  runbooks:
    - ../../docs/playbooks/SEND-OPERATIONS.md
    - ../../docs/playbooks/FIRST-CAMPAIGN-PLAN.md
  adrs:
    - ../../docs/initiatives/2026-04-22-discipline-and-domain-migration.md
