# Outreach mailbox warmup plans.
#
# Structure: plan name → ordered list of {day, daily_limit} entries.
# The daemon selects `daily_limit` for max(day) where day <= mailbox.warmup_day.
# After the final day entry the mailbox is considered "warm" and uses the
# mailbox's configured daily_limit without further ramping.
#
# Source: aggregated industry guidance from Google/Yahoo bulk-sender rules
# (Feb 2024), Postmark's warmup guide, and Mailgun's ramp curve. Keep the
# slope shallow for the first 7 days — most spam filters evaluate a new
# sender's behavior in that window.

plans:
  default_30d:
    description: |
      30-day conservative ramp for a fresh domain + fresh IP.
      Safe for Seznam.cz, Gmail, Outlook.com cold starts.
    schedule:
      - { day: 1,  daily_limit: 10  }
      - { day: 2,  daily_limit: 20  }
      - { day: 3,  daily_limit: 30  }
      - { day: 4,  daily_limit: 40  }
      - { day: 5,  daily_limit: 50  }
      - { day: 6,  daily_limit: 60  }
      - { day: 7,  daily_limit: 75  }
      - { day: 10, daily_limit: 100 }
      - { day: 14, daily_limit: 150 }
      - { day: 18, daily_limit: 200 }
      - { day: 22, daily_limit: 250 }
      - { day: 26, daily_limit: 300 }
      - { day: 30, daily_limit: 400 }

  aggressive_14d:
    description: |
      14-day ramp for a pre-warmed domain on a new IP.
      Only use when the sending domain has at least 90 days of reputation
      and the DNS (SPF/DKIM/DMARC) is fully aligned.
    schedule:
      - { day: 1,  daily_limit: 25  }
      - { day: 3,  daily_limit: 60  }
      - { day: 5,  daily_limit: 120 }
      - { day: 7,  daily_limit: 200 }
      - { day: 10, daily_limit: 300 }
      - { day: 14, daily_limit: 500 }

  cs_seznam_friendly:
    description: |
      Seznam.cz-specific plan. Seznam greylists aggressively for new
      senders and releases after 5–15 minutes — do not pressure the MTA.
      Plateau at 150/day; Seznam throttles anything higher for
      non-opt-in B2B traffic.
    schedule:
      - { day: 1,  daily_limit: 5   }
      - { day: 3,  daily_limit: 15  }
      - { day: 5,  daily_limit: 30  }
      - { day: 7,  daily_limit: 50  }
      - { day: 10, daily_limit: 75  }
      - { day: 14, daily_limit: 100 }
      - { day: 21, daily_limit: 120 }
      - { day: 30, daily_limit: 150 }

  fresh_ip_r8c:
    description: |
      7-day fresh-IP warmup for R8c post-rotation cutover. Short ramp
      assumes the sending *domain* already has reputation — only the IP
      is new. Combine with the shouldAutoPause fail-safe: three
      consecutive SMTP auth failures during warmup → mailbox paused +
      operator alerted. See docs/archive/SMTP-EGRESS-LOCKDOWN-SPRINTS.md
      (R8c) for the full cutover procedure.
    schedule:
      - { day: 1, daily_limit: 10 }
      - { day: 2, daily_limit: 25 }
      - { day: 4, daily_limit: 50 }
      - { day: 8, daily_limit: 400 }

  vykup_24mb:
    description: |
      Conservative 14-day ramp for the 24-mailbox Seznam fleet used by
      the výkup techniky campaign. Per-mailbox curve plateaus at 20/day
      so the fleet caps at 24 × 20 = 480 mails/day. First day batch is
      24 × 2 = 48 mails (50% lower per-mailbox than `cs_seznam_friendly`
      day 1 to stay under Seznam greylist pressure with fresh senders).
      After day 14 the mailbox is considered warm and uses the configured
      daily_limit (default 20) without further ramping.
    schedule:
      - { day: 1,  daily_limit: 2  }
      - { day: 4,  daily_limit: 5  }
      - { day: 8,  daily_limit: 10 }
      - { day: 15, daily_limit: 20 }

# Pause rules — when to automatically pause a warmup.
# The daemon reads mailbox_warmup.is_paused and skips ramp-up advancement
# when any of the following are true for the mailbox's domain:
#   - bounce_rate > 3% in the last 24h
#   - domain circuit breaker is open
#   - RBL listing detected
# Pause is set by the metrics consumer, not by the warmup daemon itself.
