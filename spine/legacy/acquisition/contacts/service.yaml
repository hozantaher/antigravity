# service.yaml — contacts domain
# Viz docs/architecture/DOMAIN-MAP.md + docs/playbooks/DOMAIN-MIGRATION.md
name: contacts
domain: outreach
owner: tomas
status: scaffold                       # M4.1 — no code moved yet
deploy_target: shared                  # hosted v machinery-outreach binary
railway_service_name: machinery-outreach
technology:
  - go
  - typescript                         # future @hozan/contacts-ui
migration_state:
  M4.1: done                           # this scaffold commit
  M4.2: planned                        # move enrich (23 files, 0 internal deps after M3 prep)
  M4.3: planned                        # move segment + contact/lead/prospect (if exist)
  M4.4: planned                        # move UI pages to @hozan/contacts-ui
  M4.5: planned                        # service.yaml active + API contracts
dependencies:
  upstream:
    - outreach/company                 # moved out of internal 2026-04-22
    - outreach/exclusion               # moved out of internal 2026-04-22
    - scrapers                         # data ingestion (firmy.cz, ARES, justice, VVZ)
    - database/outreach_contacts + outreach_companies
  downstream:
    - campaigns                        # target selection
    - intelligence                     # scoring + lookalike
    - dashboard                        # UI: /contacts, /leads, /companies, /segments
public_api:
  rest:
    - GET    /api/contacts
    - PATCH  /api/contacts/:id
    - DELETE /api/contacts/:id
    - POST   /api/contacts/:id/verify-email
    - GET    /api/companies
    - GET    /api/companies/:ico
    - POST   /api/companies/bulk-verify-email
    - GET    /api/segments
    - POST   /api/segments
    - POST   /api/segments/:id/rebuild
    - GET    /api/leads
    - PATCH  /api/leads/:id
  schemas: schemas/openapi.yaml
invariants:
  - "Unique constraint (email, tenant) — žádné duplicity"
  - "Segment membership deterministický vůči query snapshot"
  - "Enrichment TTL 7 dní default"
  - "Suppression list blokuje send bez ohledu na kampaň"
  - "Exclusion rules (outreach/exclusion) vyloučí kontakt z všech kampaní"
slo:
  availability: 99.9
  latency_p95_ms: 300
  segment_rebuild_100k_ms: 30000
sub_services:
  - registry                           # contacts/leads/prospects CRUD
  - companies                          # company registry + dedup
  - segments                           # segment membership queries
  - enrichment                         # data refresh (web scrape, justice, vvz)
  - deliverability                     # MX probe, SMTP verify
docs:
  - docs/architecture/DOMAIN-MAP.md#contacts
  - docs/initiatives/2026-04-22-discipline-and-domain-migration.md
