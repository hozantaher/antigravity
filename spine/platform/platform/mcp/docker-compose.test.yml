version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: garaaage_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 2s
      timeout: 5s
      retries: 10

  garaaage-mcp:
    build:
      context: .
      target: mcp
    environment:
      DATABASE_URL: postgres://test:test@postgres:5432/garaaage_test
      MCP_ISSUER_URL: http://garaaage-mcp:3002
      MCP_SECRET: test-e2e-secret
      MCP_PORT: "3002"
      NODE_ENV: test
    ports:
      - "3001:3002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3002/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
