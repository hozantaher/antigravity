[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Healthcheck path is Ollama's native /api/tags (returns JSON model list).
# 60 s timeout pokrývá cold start (daemon init + first /api/tags response);
# preload modelů (5–15 GB stažení) běží na pozadí a healthcheck ji NEblokuje.
healthcheckPath = "/api/tags"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
