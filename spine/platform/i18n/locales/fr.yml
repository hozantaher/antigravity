hiwTitle1: Inscription
hiwDesc1: Inscrivez-vous et après avoir rempli le formulaire d'inscription, vous recevrez une confirmation d'inscription par e-mail. Une fois connecté, vous aurez accès gratuitement à l'offre de véhicules et de machines qui sont dans notre vente aux enchères.
hiwDesc2: Pour une participation active à l'enchère et la possibilité d'enchérir sur les articles sélectionnés, un acompte remboursable est requis. Les instructions se trouvent dans votre profil. Le dépôt est remboursable et peut être utilisé pour payer le prix d'achat de l'article mis aux enchères ou retourné sur votre compte.
hiwTitle3: Enchérir et gagner
hiwDesc3: Si le prix minimum est atteint et que votre offre est la plus élevée, vous devenez le gagnant de l'enchère et vous recevrez un e-mail avec des instructions pour le paiement et la collecte de l'article mis aux enchères.
