hiwTitle1: Registrierung
hiwDesc1: Melden Sie sich an und nach dem Ausfüllen des Anmeldeformulars erhalten Sie eine Anmeldebestätigung per E-Mail. Nach dem Einloggen haben Sie freien Zugriff auf das Angebot an Fahrzeugen und Maschinen, die sich in unserer Auktion befinden.
hiwTitle2: Auktionator
hiwDesc2: Um aktiv an der Auktion teilzunehmen, muss eine rückzahlbare Kaution hinterlegt werden. Anweisungen finden Sie in Ihrem Profil. Die Kaution ist erstattungsfähig und kann zur Zahlung des Kaufpreises verwendet oder auf Ihr Konto zurückgebucht werden.
hiwTitle3: Bieten und gewinnen
hiwDesc3: Wenn der Mindestpreis erreicht ist und Ihr Angebot das höchste ist, gewinnen Sie die Auktion und Sie erhalten nach der Auktion die Anweisungen zur Bezahlung und Übernahme des Gegenstands der Auktion.
