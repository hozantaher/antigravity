hiwTitle1: التسجيل
hiwDesc1: قم بالتسجيل وبعد ملء استمارة التسجيل سوف تتلقى بيانات تسجيل الدخول عن طريق البريد الإلكتروني. بعد تسجيل الدخول ، سيكون لديك وصول مجاني إلى عرض المركبات والآلات الموجودة في مزادنا الإلكتروني.
hiwTitle2: المزايدة والفوز
hiwDesc2: للمشاركة الفعالة في المزاد ، من الضروري إيداع أصل المزاد بمبلغ 500 يورو. يتم إيداع أصل المزاد في حساب الشركة. يمكنك المشاركة في المزاد والمزاد العلني لجميع العناصر.
hiwTitle3: ٣. المزايدة والفوز
hiwDesc3: إذا كان عرضك هو الأعلى ، فستصبح الفائز بالمزاد وسيتم إرسال بريد إلكتروني فائز إليك بعد المزاد ، يحتوي على تعليمات حول كيفية الدفع والاستحواذ على السيارة.
