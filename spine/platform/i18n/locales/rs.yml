hiwTitle1: Registracija
hiwDesc1: Registrujte se i nakon popunjavanja obrasca za registraciju, dobićete potvrdu o registraciji putem mejla. Nakon prijave, imaćete slobodan pristup ponudi vozila i mašina koje se nalaze na našoj aukciji.
hiwTitle2: Aukcionar
hiwDesc2: Za aktivno učešće na aukciji i mogućnost licitiranja za odabrane artikle potreban je povratni depozit. Uputstva se nalaze na vašem profilu. Depozit se vraća i može se koristiti za plaćanje kupoprodajne cene predmeta na aukciji ili vraćen na vaš račun.
hiwTitle3: Licitiranje i pobeda
hiwDesc3: Ako je minimalna cena dostignuta i vaša ponuda je najveća, postajete pobednik aukcije i biće vam poslat e-mail sa uputstvima za plaćanje i preuzimanje izlicitiranog predmeta.
