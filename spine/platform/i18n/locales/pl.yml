hiwTitle1: Rejestracja
hiwDesc1: Zarejestruj się, a po wypełnieniu formularza rejestracyjnego otrzymasz e-mailem potwierdzenie rejestracji. Po zalogowaniu będziesz miał bezpłatny dostęp do oferty pojazdów i maszyn znajdujących się na naszej aukcji.
hiwTitle2: Licytator
hiwDesc2: Za aktywny udział w aukcji i możliwość licytowania wybranych pozycji wymagana jest kaucja zwrotna. Instrukcje znajdziesz w swoim profilu. Kaucja podlega zwrotowi i może zostać wykorzystana na zapłacenie ceny zakupu wylicytowanego przedmiotu lub zwrócona na Twoje konto.
hiwTitle3: Licytowanie i wygrywanie
hiwDesc3: Jeśli cena minimalna zostanie osiągnięta, a Twoja oferta jest najwyższa, zostajesz zwycięzcą aukcji i otrzymasz wiadomość e-mail z instrukcjami dotyczącymi płatności i odbioru wylicytowanego przedmiotu.
