hiwTitle1: Регистрация
hiwDesc1: Зарегистрируйтесь и после заполнения регистрационной формы вы получите подтверждение регистрации по электронной почте. После входа в систему вы получите бесплатный доступ к предложению транспортных средств и машин, которые находятся на нашем аукционе.
hiwTitle2: Аукционист
hiwDesc2: Для активного участия в аукционе и возможности делать ставки на выбранные предметы требуется возвратный депозит. Инструкцию можно найти в вашем профиле. Депозит подлежит возврату и может быть использован для оплаты покупной цены предмета, выставленного на аукцион, или возвращен на ваш счет.
hiwTitle3: Торги и выигрыш
hiwDesc3: Если достигнута минимальная цена и ваша ставка самая высокая, вы становитесь победителем аукциона, и вам будет отправлено электронное письмо с инструкциями по оплате и получению выставленного на аукцион предмета.
