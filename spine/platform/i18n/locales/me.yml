hiwTitle1: Registracija
hiwDesc1: Registrirajte se i nakon popunjavanja obrasca za registraciju, na e-mail ćete dobiti potvrdu o registraciji. Nakon prijave imat ćete slobodan pristup ponudi vozila i strojeva koji se nalaze na našoj aukciji.
hiwTitle2: Aukcionar
hiwDesc2: Za aktivno sudjelovanje u aukciji i mogućnost nadmetanja za odabrane artikle potrebno je uplatiti povratni depozit. Upute možete pronaći u svom profilu. Depozit aukcije je povratni i može se koristiti za plaćanje kupoprodajne cijene predmeta na aukciji ili se može vratiti na vaš račun.
hiwTitle3: Nadmetanje i pobjeda
hiwDesc3: Ukoliko je postignuta minimalna cijena, a vaša ponuda bude najveća, postajete pobjednik aukcije te ćete dobiti e-mail s uputama za plaćanje i preuzimanje izlicitiranog predmeta.
