hiwTitle2: Auctioneer
hiwDesc2: In order to be able to bid on selected items, it is necessary to pay a refundable deposit. Instructions can be found in your profile. The refundable deposit can be used to pay the purchase price of the auctioned item or returned to your account.
hiwTitle3: Bidding and winning
