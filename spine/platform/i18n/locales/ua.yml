hiwTitle1: Реєстрація
hiwDesc1: Зареєструйтесь і після заповнення реєстраційної форми ви отримаєте підтвердження реєстрації на електронну пошту. Після входу ви отримаєте вільний доступ до пропозиції транспортних засобів і машин, які представлені на нашому аукціоні.
hiwTitle2: Аукціоніст
hiwDesc2: Для активної участі в аукціоні та можливості робити ставки на обрані позиції необхідно внести депозит, що повертається. Інструкції можна знайти у вашому профілі. Депозит підлягає поверненню та може бути використаний для оплати вартості товару, проданого на аукціоні, або повернений на ваш рахунок.
hiwTitle3: Ставки та перемога
hiwDesc3: Якщо мінімальна ціна досягнута, а ваша ставка найвища, ви стаєте переможцем аукціону, і вам буде надіслано електронний лист з інструкціями щодо оплати та отримання предмета, проданого на аукціоні.
