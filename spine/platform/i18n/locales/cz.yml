hiwTitle1: Registrace
hiwDesc1: Zaregistrujte se a po vyplnění registračního formuláře Vám na email přijde potvrzení o registraci. Po přihlášení budete mít volný přístup k nabídce vozidel a strojů, které jsou v naší aukci.
hiwTitle2: Dražitel
hiwDesc2: Pro aktivní účast v aukci a možnost dražit vybrané předměty je nutné složit dražební jistinu. Instrukce najdete ve Vašem profilu. Aukční jistina je vratná a může být použita při úhradě kupní ceny vydraženého předmětu nebo vrácena zpět na Váš účet.
hiwTitle3: Nabízet a vyhrávat
hiwDesc3: Pokud bude dosaženo minimální ceny a vaše nabídka je nejvyšší, stáváte se vítězem aukce a bude Vám zaslán e-mail s pokyny pro zaplacení a převzetí vydraženého předmětu.
