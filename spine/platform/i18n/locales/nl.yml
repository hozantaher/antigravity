hiwTitle1: Registratie
hiwDesc1: Schrijf je in en na het invullen van het inschrijfformulier ontvang je een bevestiging van inschrijving per e-mail. Na het inloggen krijgt u gratis toegang tot het aanbod van voertuigen en machines die in onze veiling staan.
hiwTitle2: Veilingmeester
hiwDesc2: Voor actieve deelname aan de veiling en de mogelijkheid om op geselecteerde items te bieden, is een borg vereist. Instructies vind je in je profiel. De aanbetaling wordt terugbetaald en kan worden gebruikt om de aankoopprijs van het geveilde item te betalen of terug te storten op uw rekening.
hiwTitle3: Bieden en winnen
hiwDesc3: Als de minimumprijs is bereikt en uw bod het hoogste is, wordt u de winnaar van de veiling en ontvangt u een e-mail met instructies voor betaling en afhaling van het geveilde item.
