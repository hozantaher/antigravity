[build]
builder = "DOCKERFILE"
dockerfilePath = "features/inbound/orchestrator/Dockerfile"

[deploy]
# Migrations now run via scripts/migrations/run.sh outside the orchestrator
# binary (BF-G2 migration runner). The orchestrator binary itself just serves
# HTTP — no in-process schema migrate at boot.
startCommand = "/app/outreach server"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[volumes]]
# Photo storage for inbound image attachments. Persists raw blobs via
# photostore.Save() from the inbound message processing pipeline (Track E,
# photo_parse_audit). Retention: keep all photos indefinitely unless
# a DSR (GDPR Article 17) explicitly deletes the thread.
mountPath = "/data/photos"
# 10 GB: expected to store 5–10k photos per campaign cycle (4–5 months)
# at ~600 KB avg photo size. Growth: estimate 10 new campaigns/month,
# so 500 MB/month baseline; 10 GB provides ~20 month headroom.
size = "10Gi"
