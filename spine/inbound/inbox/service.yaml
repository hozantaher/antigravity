# service.yaml — inbox domain
name: inbox
domain: outreach
owner: tomas
status: scaffold
deploy_target: shared
railway_service_name: machinery-outreach
technology:
  - go
migration_state:
  M5.1: done                           # scaffold
  M5.2: planned                        # move imap + thread
dependencies:
  upstream:
    - mailboxes/mailbox                # credentials + status
    - outreach/humanize                # reply classification helpers
    - outreach/health                  # poller health
    - database/outreach_messages + outreach_threads
  downstream:
    - intelligence                     # reply metrics
    - dashboard                        # UI: /inbox, /replies, /threads
public_api:
  rest:
    - GET    /api/inbox
    - GET    /api/replies
    - GET    /api/replies/:id
    - PATCH  /api/replies/:id/handled
    - GET    /api/threads/:id/context
    - GET    /api/threads/:id/messages
  schemas: schemas/openapi.yaml
invariants:
  - "IMAP polling idempotent (message UID dedup)"
  - "Reply classification fallback na 'unknown', nikdy nehází nahoru"
  - "Thread merging deterministický (In-Reply-To + References)"
slo:
  availability: 99.0
  imap_poll_lag_minutes: 5
  classification_p95_ms: 2000
sub_services:
  - imap                               # IMAP poller + UID state
  - thread                             # thread resolver + merging
  - reply                               # reply classification
docs:
  - docs/architecture/DOMAIN-MAP.md#inbox
  - docs/initiatives/2026-04-22-discipline-and-domain-migration.md
